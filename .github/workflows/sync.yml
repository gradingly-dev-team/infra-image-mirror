name: sync-infra-mirror

# Triggered only on-demand. Bootstrap-critical images should change
# only when a human intentionally bumps a version tag in the matrix
# below — not silently by a scheduled refresh. Bump a tag → run the
# workflow manually → new bits land in ghcr.io.

on:
  workflow_dispatch:

permissions:
  packages: write
  contents: read

jobs:

  # ---------------------------------------------------------------------------
  # Pure mirrors — skopeo copy, preserve multi-arch manifests.
  #
  # Source is the in-house Harbor instance, NOT Docker Hub, for historical
  # reasons. The Redis / redis-exporter / postgres-exporter images were
  # originally mirrored from `docker.io/bitnami/*`, but Bitnami deprecated
  # their free Docker Hub distribution in 2025. The only remaining copies
  # of these specific tags are in our Harbor. This workflow pulls from
  # Harbor and publishes to ghcr.io, which (unlike Harbor) can be reached
  # without Harbor itself being healthy — the whole point of this mirror.
  #
  # Long-term, harbor-redis should migrate off Bitnami (to Valkey or the
  # official Redis image). That's a separate migration ticket, not in
  # scope for the resilience fix. Until then, this workflow keeps the
  # existing Bitnami-origin bits accessible via a non-circular path.
  #
  # Auth required: `HARBOR_PULL_USERNAME` + `HARBOR_PULL_PASSWORD` repo
  # secrets, typically a dedicated pull-only robot on the `library`
  # project. See Harbor AGENT.md for how to create a pull robot.
  # ---------------------------------------------------------------------------
  sync-copy:
    name: sync ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: redis
            src: registry.gradingly.com/library/redis:8.6.1
            dst_tag: redis:8.6.1
          - name: redis-exporter
            src: registry.gradingly.com/library/redis-exporter:1.80.1
            dst_tag: redis-exporter:1.80.1
          - name: postgres-exporter
            src: registry.gradingly.com/library/postgres-exporter:0.18.1
            dst_tag: postgres-exporter:0.18.1
    steps:
      - name: Install skopeo
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo

      - name: Login to source registry (Harbor)
        run: |
          echo "${{ secrets.HARBOR_PULL_PASSWORD }}" | \
            skopeo login registry.gradingly.com \
              -u "${{ secrets.HARBOR_PULL_USERNAME }}" \
              --password-stdin

      - name: Login to destination registry (ghcr.io)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            skopeo login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Copy ${{ matrix.src }} -> ghcr.io
        run: |
          skopeo copy --all \
            docker://${{ matrix.src }} \
            docker://ghcr.io/${{ github.repository_owner }}/infra-image-mirror/${{ matrix.dst_tag }}

      - name: Verify digest
        run: |
          skopeo inspect \
            docker://ghcr.io/${{ github.repository_owner }}/infra-image-mirror/${{ matrix.dst_tag }} \
            | jq -r '{Name, Digest, Created}'

  # ---------------------------------------------------------------------------
  # In-house build — CNPG postgres with PostGIS + pgvector + barman.
