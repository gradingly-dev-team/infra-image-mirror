name: sync-infra-mirror

# Runs every Sunday at 03:00 UTC — two hours before the AKS maintenance window
# (Sundays 05:00 UTC) so fresh images are available before any node rotation.
# Also triggerable manually via workflow_dispatch.

on:
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:

permissions:
  packages: write
  contents: read

jobs:

  # ---------------------------------------------------------------------------
  # Pure mirrors — skopeo copy, preserve multi-arch manifests.
  # ---------------------------------------------------------------------------
  sync-copy:
    name: sync ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: redis
            src: docker.io/bitnami/redis:8.6.1
            dst_tag: redis:8.6.1
          - name: redis-exporter
            src: docker.io/bitnami/redis-exporter:1.80.1
            dst_tag: redis-exporter:1.80.1
          - name: postgres-exporter
            src: docker.io/bitnami/postgres-exporter:0.18.1
            dst_tag: postgres-exporter:0.18.1
    steps:
      - name: Install skopeo
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo

      - name: Login to ghcr.io
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            skopeo login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Copy ${{ matrix.src }} -> ghcr.io
        run: |
          skopeo copy --all \
            docker://${{ matrix.src }} \
            docker://ghcr.io/${{ github.repository_owner }}/infra-image-mirror/${{ matrix.dst_tag }}

      - name: Verify digest
        run: |
          skopeo inspect \
            docker://ghcr.io/${{ github.repository_owner }}/infra-image-mirror/${{ matrix.dst_tag }} \
            | jq -r '{Name, Digest, Created}'

